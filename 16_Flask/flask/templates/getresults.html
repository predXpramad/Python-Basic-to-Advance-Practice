<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grades Form</title>
    
    <style>
        /* Modern UI Styling */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .form-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            margin-top: 0;
            color: #2d3436;
            text-align: center;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #636e72;
            font-size: 14px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #dfe6e9;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box; /* Critical for width alignment */
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #0984e3;
            box-shadow: 0 0 8px rgba(9, 132, 227, 0.2);
        }

        input[type="submit"] {
            width: 100%;
            background-color: #0984e3;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        input[type="submit"]:hover {
            background-color: #74b9ff;
        }

        .note {
            font-size: 12px;
            color: #b2bec3;
            text-align: center;
            margin-top: 20px;
            line-height: 1.5;
        }
    </style>

    <script type="text/javascript">
        // Basic JavaScript can be added here if needed
        console.log("Jinja2 Template Loaded Successfully");
    </script>
</head>
<body>

    <div class="form-container">
        <h2>Student Grades</h2>

        <!-- Jinja2 Post Route -->
        <form action="/submit" method="post">
            
            <div class="form-group">
                <label for="science">Science Marks</label>
                <input type="text" id="science" name="science" placeholder="0">
            </div>

            <div class="form-group">
                <label for="maths">Maths Marks</label>
                <input type="text" id="maths" name="maths" placeholder="0">
            </div>

            <div class="form-group">
                <label for="c">C Programming</label>
                <input type="text" id="c" name="c" placeholder="0">
            </div>

            <div class="form-group">
                <label for="datascience">Data Science</label>
                <input type="text" id="datascience" name="datascience" placeholder="0">
            </div>
            
            <input type="submit" value="Calculate Average">

        </form>

        <p class="note">
            Submit your scores to calculate the average. <br>
            Request sent to <strong>/submit</strong> via POST.
        </p>
    </div>

</body>
</html>
